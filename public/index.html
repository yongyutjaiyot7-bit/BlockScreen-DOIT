<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Block Screen"/>
  <title>BLOCK SCREEN</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <meta name="theme-color" content="#0284c7"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">
    <!-- rendered by app.js -->
  </div>
  <div id="toast"></div>

  <!-- QR Scanner modal -->
  <div id="scanModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>สแกน QR Code</span>
        <button onclick="closeScan()">✕</button>
      </div>
      <video id="scanVideo" playsinline autoplay muted></video>
      <p class="scan-hint">หรือพิมพ์ด้วยตนเอง:</p>
      <div class="row gap-sm">
        <input id="scanManual" placeholder="พิมพ์ค่า..." class="flex1"/>
        <button onclick="manualScan()">ตกลง</button>
      </div>
    </div>
  </div>

  <script src="xlsx.mini.js"></script>
  <script src="jsQR.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
